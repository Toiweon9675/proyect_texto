name: Prueba actualización rápida

on:
  schedule:
    - cron: "* * * * *"   # Cada minuto
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Ejecutar script de prueba
        run: python exportar_odoo.py
